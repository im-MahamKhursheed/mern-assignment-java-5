<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
</head>
<body>
    <form action="">
        <label>Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <label>Class:</label>
        <input type="number" id="classs" name="class"><br><br>

        <label>City:</label>
        <input type="text" id="city" name="city"><br><br>

        <label>Profile Picture URL:</label>
        <input type="url" id="profilePic" name="profilePic" oninput="previewImage()"><br><br>
        <img id="preview" src="" alt="Image Preview"><br><br>

        <button type="submit" onclick="validateLogin()">Create Profile Card</button>
        <button onclick="resetForm()">Reset</button>
        <br><br>
        <button onclick="DarkMode()">Toggle Dark Mode</button>
    </form>
    <br>
    <div id="profileContainer"></div>
    
    <script src="script.js"></script>
</body>
</html>
